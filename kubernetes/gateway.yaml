apiVersion: apps/v1
kind: Deployment
metadata:
  name: failover-gateway
  namespace: multi-cloud-dr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: failover-gateway
  template:
    metadata:
      labels:
        app: failover-gateway
    spec:
      containers:
        - name: failover-gateway
          image: dr-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: failover-gateway
  namespace: multi-cloud-dr
spec:
  selector:
    app: failover-gateway
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP